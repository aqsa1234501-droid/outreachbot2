name: Run Contact Bot (Multi-Store)

on:
  workflow_dispatch:

  schedule:
    - cron: "30 4 * * *"

concurrency:
  group: contact-bot-multistore
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Gemini Key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Gemini key length: ${#GEMINI_API_KEY}"

      - name: Test Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - << 'EOF'
          import os
          import google.generativeai as genai

          key = os.environ.get("GEMINI_API_KEY", "")

          print("Gemini key length:", len(key))

          if not key:
              raise Exception("GEMINI_API_KEY secret is empty")

          genai.configure(api_key=key)

          try:
              model = genai.GenerativeModel("gemini-1.5-flash")
              response = model.generate_content("Reply with exactly: GEMINI WORKING")
              print("SUCCESS:")
              print(response.text)
          except Exception as e:
              print("GEMINI ERROR:")
              print(str(e))
              raise
          EOF

      - name: Install Playwright + Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run contact bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          python -u contact_bot_multistore.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore
